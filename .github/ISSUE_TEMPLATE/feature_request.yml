name: Feature request
description: Suggest an idea or improvement
title: "[feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Forge's thesis: the operational intelligence lives in the **harness**, not the
        weights, and the runtime stays model-agnostic and standard-library only. Ideas
        that make weaker models operationally more capable are especially welcome.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The use case or pain point, not just the proposed solution.
      placeholder: When working with ..., forge currently ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to see. Rough is fine.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why this one.
    validations:
      required: false
  - type: checkboxes
    id: constraints
    attributes:
      label: Fit with project constraints
      options:
        - label: Keeps the runtime standard-library only (no new third-party runtime deps)
        - label: Stays model-agnostic (works across any local/OpenAI-compatible backend)

name: publish

# Tag-triggered auto-release. Push a vX.Y.Z tag and this does everything:
# run the full test matrix, prove the tag matches the code version, build and
# smoke-test the wheel, publish to PyPI, and create the GitHub Release from the
# `release:` commit body. No manual `gh release create` step.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false   # never interrupt an in-flight release

jobs:
  # 1. Gate the release on the SAME 3.10–3.13 matrix every commit runs. No green
  #    tests → no publish, no release.
  tests:
    uses: ./.github/workflows/test.yml

  # 2. Prove the release is coherent before anything leaves the building: the tag
  #    must equal forge.__version__, and the built wheel must install into a clean
  #    environment and start the CLI. The artifact published in step 3 is exactly
  #    the one vetted here.
  guard:
    needs: tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false   # this job builds/installs repo code — don't leave a token in .git/config
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"

      - name: Assert release tag matches forge.__version__
        run: |
          version=$(python -c "import forge, sys; sys.stdout.write(forge.__version__)")
          tag="${GITHUB_REF_NAME#v}"
          echo "forge.__version__ = $version  ·  release tag = ${GITHUB_REF_NAME}"
          if [ "$version" != "$tag" ]; then
            echo "::error::release tag ${GITHUB_REF_NAME} does not match forge.__version__ ($version) — refusing to release"
            exit 1
          fi

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Smoke-test the built wheel in a clean environment
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/forge --version
          /tmp/smoke/bin/forge --help
          got=$(/tmp/smoke/bin/forge --version | awk '{print $2}')
          if [ "$got" != "${GITHUB_REF_NAME#v}" ]; then
            echo "::error::installed CLI reports '$got', expected '${GITHUB_REF_NAME#v}'"
            exit 1
          fi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  # 3. Publish the vetted artifact via PyPI trusted publishing (OIDC).
  pypi:
    needs: guard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write   # PyPI trusted publishing (OIDC) — no API token to manage
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247  # v1.14.0 (commit, not the annotated-tag object)
        with:
          skip-existing: true   # a re-pushed tag recovering a failed github-release must not 400 on a duplicate

  # 4. Publish is live → create the GitHub Release, titled and noted from the
  #    `release: vX.Y.Z — …` commit (the same notes we'd write by hand). A Release
  #    existing therefore means the version is on PyPI.
  github-release:
    needs: pypi
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write   # create the GitHub Release
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false   # release is created via GH_TOKEN + gh, not git-config creds
      - name: Create the GitHub Release from the release commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          subject=$(git log -1 --format=%s HEAD)
          title="${subject#release: }"
          git log -1 --format=%b HEAD | grep -iv '^Co-Authored-By:' > release-notes.md || true
          # a body of only blank lines is non-empty on disk but visually blank — fall back
          if ! grep -q '[^[:space:]]' release-notes.md; then
            echo "See the release commit for details." > release-notes.md
          fi
          gh release create "${GITHUB_REF_NAME}" \
            --title "$title" \
            --notes-file release-notes.md \
            --latest \
            --verify-tag

name: publish

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false   # never interrupt an in-flight publish

jobs:
  # 1. Gate the release on the SAME 3.10–3.13 matrix every commit runs. No green
  #    tests → no publish.
  tests:
    uses: ./.github/workflows/test.yml

  # 2. Prove the release is coherent before anything leaves the building: the tag
  #    must equal forge.__version__, and the built wheel must install into a clean
  #    environment and start the CLI. The artifact published in step 3 is exactly
  #    the one vetted here.
  guard:
    needs: tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Assert release tag matches forge.__version__
        run: |
          version=$(python -c "import forge, sys; sys.stdout.write(forge.__version__)")
          tag="${GITHUB_REF_NAME#v}"
          echo "forge.__version__ = $version  ·  release tag = ${GITHUB_REF_NAME}"
          if [ "$version" != "$tag" ]; then
            echo "::error::release tag ${GITHUB_REF_NAME} does not match forge.__version__ ($version) — refusing to publish"
            exit 1
          fi

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Smoke-test the built wheel in a clean environment
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/forge --version
          /tmp/smoke/bin/forge --help
          got=$(/tmp/smoke/bin/forge --version | awk '{print $2}')
          if [ "$got" != "${GITHUB_REF_NAME#v}" ]; then
            echo "::error::installed CLI reports '$got', expected '${GITHUB_REF_NAME#v}'"
            exit 1
          fi

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  # 3. Publish the vetted artifact via PyPI trusted publishing (OIDC).
  pypi:
    needs: guard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write   # PyPI trusted publishing (OIDC) — no API token to manage
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@6733eb7d741f0b11ec6a39b58540dab7590f9b7d  # v1.14.0

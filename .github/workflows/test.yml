name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:        # reusable — publish.yml gates the release on this exact matrix

permissions:
  contents: read

concurrency:
  # Cancel superseded runs on the same ref (e.g. a new push to a PR branch). The ref
  # is unique per release tag, so a publish-invoked run is never cancelled by this.
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        run: python -m unittest discover -s tests -v

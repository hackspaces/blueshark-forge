name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:        # reusable — publish.yml gates the release on this exact matrix

permissions:
  contents: read

concurrency:
  # Cancel superseded runs on the same ref (e.g. a new push to a PR branch). The ref
  # is unique per release tag, so a publish-invoked run is never cancelled by this.
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        run: python -m unittest discover -s tests -v
